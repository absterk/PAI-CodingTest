# Baseline: ResNet18 U-Net + L1 loss.
# This is the reference configuration for the PAI-CodingTest.
# The intern's task is to swap `arch`/`backbone` to a Swin Transformer variant
# (see README "Task" section) and compare against this baseline.

# --- Data ---
data_root: ./data
splits_path: ./data/splits.json
a_max: 0.02
img_size: 128
input_standardize: false
augment: false

# --- Model ---
arch: resnet_unet          # {"resnet_unet", "attention_unet"}
backbone: resnet18         # {"resnet18", "resnet34", "resnet50"}
n_class: 2

# --- Loss ---
# Options: l1, roi_weighted, l1_ssim, l1_ssim_vgg, amp_l1, amp_l1_ssim
loss_type: l1
ssim_weight: 0.5
vgg_weight: 0.1
roi_weight: 5.0
amp_weight_alpha: 3.0

# --- Optimization ---
batch_size: 64
lr: 1.0e-4
weight_decay: 1.0e-2
epochs: 100
early_stop_patience: 50
grad_clip_norm: 1.0
num_workers: 0

# --- Runtime ---
seed: 42
device: auto               # {"auto", "cpu", "cuda", "mps"}

# --- Logging ---
save_root: ./checkpoints
run_name: ""               # empty -> autogenerated
wandb_project: PAI-CodingTest
wandb_mode: online         # {"online", "offline", "disabled"}
